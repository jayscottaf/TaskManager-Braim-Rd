<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="roof" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- House body -->
  <rect x="148" y="252" width="216" height="164" rx="12" fill="white" opacity="0.95"/>
  <!-- Roof -->
  <path d="M256 108 L396 252 L116 252 Z" fill="url(#roof)"/>
  <!-- Door -->
  <rect x="224" y="320" width="64" height="96" rx="8" fill="#2563eb" opacity="0.3"/>
  <!-- Checkmark -->
  <path d="M200 280 L244 324 L328 220" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" opacity="0.0"/>
  <!-- Checkmark overlay on house -->
  <g transform="translate(256, 296)">
    <circle r="72" fill="#2563eb" opacity="0.9"/>
    <path d="M-28 4 L-8 24 L32 -16" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
